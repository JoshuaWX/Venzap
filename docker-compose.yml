name: venzap

x-common-env: &common-env
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://venzap:venzap@db:5432/venzap}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  ENVIRONMENT: ${ENVIRONMENT:-development}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
  PAYAZA_BASE_URL: ${PAYAZA_BASE_URL:-https://api.payaza.africa}
  PAYAZA_SECRET_KEY: ${PAYAZA_SECRET_KEY:-change-me}
  SECRET_KEY: ${SECRET_KEY:-change-me-min-32-characters}
  ALGORITHM: ${ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-change-me}

services:
  db:
    image: postgres:15-alpine
    container_name: venzap-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-venzap}
      POSTGRES_USER: ${POSTGRES_USER:-venzap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-venzap}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-venzap} -d ${POSTGRES_DB:-venzap}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - venzap-network

  redis:
    image: redis:7-alpine
    container_name: venzap-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1000"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - venzap-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: venzap-api
    restart: unless-stopped
    environment:
      <<: *common-env
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://venzap:venzap@db:5432/venzap}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@venzap.ng}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)" >/dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - venzap-network

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: venzap-bot
    restart: unless-stopped
    environment:
      <<: *common-env
      API_BASE_URL: ${API_BASE_URL:-http://api:8000/api/v1}
    command:
      - python
      - -m
      - bot.main
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - venzap-network

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: venzap-celery
    restart: unless-stopped
    environment:
      <<: *common-env
    command: >
      celery -A app.celery_app:celery_app worker --loglevel=INFO --concurrency=${CELERY_CONCURRENCY:-4}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - venzap-network

  nginx:
    image: nginx:1.27-alpine
    container_name: venzap-nginx
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        cat >/etc/nginx/conf.d/default.conf <<'EOF'
        server {
          listen 80;
          server_name _;
          server_tokens off;
          client_max_body_size 10m;

          add_header X-Frame-Options "DENY" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;
          add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;

          location /api/ {
            proxy_pass http://api:8000/;
            proxy_http_version 1.1;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
          }

          location /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok';
          }

          location / {
            return 404;
          }
        }
        EOF
        exec nginx -g 'daemon off;'
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    networks:
      - venzap-network

volumes:
  postgres_data:
  redis_data:

networks:
  venzap-network:
    driver: bridge